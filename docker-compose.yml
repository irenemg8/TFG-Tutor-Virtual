services:
  # ---------------------------------------------------------------------------
  # Application (backend + frontend bundle)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/tutor-virtual
      - OLLAMA_API_URL_LOCAL=http://host-docker-internal:11434
      - CHROMA_URL=http://chromadb:8000
    extra_hosts:
      - "host-docker-internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # ---------------------------------------------------------------------------
  # MongoDB
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # ChromaDB (vector store for RAG)
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  mongo_data:
  chroma_data:
