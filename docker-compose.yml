# ============================================================
#  Tutor Virtual (Irene) — despliegue en Dokploy
#
#  Mismo patrón que el de Dennis (probado en este servidor):
#    - red externa "dokploy-network" (la gestiona Dokploy)
#    - el servicio "app" NO abre puertos de host: usa "expose"
#      y Dokploy/Traefik enruta el dominio + HTTPS desde la UI
#      (pestaña Domains). Se sirve en la RAÍZ "/".
#
#  Los SECRETOS no van aquí: se pegan en Dokploy -> Environment
#  (ver .env.example). Las variables con "${VAR:?...}" son
#  OBLIGATORIAS; el deploy falla si no las defines.
# ============================================================

services:
  # ---------------- Base de datos relacional ----------------
  postgres:
    image: postgres:17-alpine
    container_name: tutor-irene-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      POSTGRES_DB: ${PG_DB:-tutorvirtual}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB:-tutorvirtual}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------- Base de datos vectorial (RAG) -----------
  chromadb:
    image: chromadb/chroma:latest
    container_name: tutor-irene-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
      ANONYMIZED_TELEMETRY: "False"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------- App (backend + frontend en un contenedor) ----------------
  #
  # El dominio y el HTTPS se configuran en la UI de Dokploy
  # (pestaña Domains), apuntando a este servicio, puerto 3001.
  # NO añadir labels de Traefik manualmente.
  #
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vacíos = la app vive en la raíz "/" y las llamadas a la API
        # son relativas (mismo origen). NO poner /v2 aquí.
        VITE_BASE_PATH: ${VITE_BASE_PATH:-}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_DEV_BYPASS_AUTH: ${VITE_DEV_BYPASS_AUTH:-false}
    container_name: tutor-irene-app
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      # --- Base de datos (apunta al contenedor interno) ---
      DATABASE_TYPE: postgresql
      PG_CONNECTION_STRING: postgresql://${PG_USER:-postgres}:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/${PG_DB:-tutorvirtual}
      # --- General ---
      PORT: 3001
      # NODE_ENV configurable: para el smoke-test puedes poner "development"
      # (junto con DEV_BYPASS_AUTH=true) y probar el tutor sin login CAS.
      # Para el despliegue final: production.
      NODE_ENV: ${NODE_ENV:-production}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-https://tutor-socratico.gnd.upv.es}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://tutor-socratico.gnd.upv.es}
      WORKFLOW_BASE_URL: ""
      # --- LLM: PoliGPT (lo que usa este código) ---
      LLM_PROVIDER: ${LLM_PROVIDER:-poligpt}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      POLIGPT_BASE_URL: ${POLIGPT_BASE_URL:-https://api.poligpt.upv.es}
      POLIGPT_API_KEY: ${POLIGPT_API_KEY:?POLIGPT_API_KEY is required}
      POLIGPT_MODEL: ${POLIGPT_MODEL:-qwen2.5vl:32b}
      POLIGPT_EMBED_MODEL: ${POLIGPT_EMBED_MODEL:-nomic-embed-text}
      # --- Ollama (fallback / modo upv) ---
      LLM_MODE: ${LLM_MODE:-upv}
      OLLAMA_API_URL_UPV: ${OLLAMA_API_URL_UPV:-https://ollama.gti-ia.upv.es:443}
      OLLAMA_API_URL_LOCAL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:latest}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-256}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.4}
      HISTORY_MAX_MESSAGES: ${HISTORY_MAX_MESSAGES:-20}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-60m}
      OLLAMA_STREAM_MAX_MS: ${OLLAMA_STREAM_MAX_MS:-1800000}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-180000}
      OLLAMA_CLASSIFIER_MODEL: ${OLLAMA_CLASSIFIER_MODEL:-qwen2.5:latest}
      OLLAMA_CLASSIFIER_TIMEOUT_MS: ${OLLAMA_CLASSIFIER_TIMEOUT_MS:-120000}
      OLLAMA_INSECURE_TLS: ${OLLAMA_INSECURE_TLS:-0}
      # --- ChromaDB (contenedor interno) ---
      CHROMA_URL: http://chromadb:8000
      # --- Orquestador hexagonal ---
      USE_ORCHESTRATOR: ${USE_ORCHESTRATOR:-1}
      ORCHESTRATOR_BUDGET_MS: ${ORCHESTRATOR_BUDGET_MS:-90000}
      GUARDRAIL_BUDGET_MS: ${GUARDRAIL_BUDGET_MS:-20000}
      GUARDRAIL_MIN_RETRY_BUDGET_MS: ${GUARDRAIL_MIN_RETRY_BUDGET_MS:-10000}
      ORCHESTRATOR_STREAM_TOKENS: ${ORCHESTRATOR_STREAM_TOKENS:-1}
      # --- Debug / observabilidad ---
      DEBUG_OLLAMA: ${DEBUG_OLLAMA:-0}
      DEBUG_PIPELINE: ${DEBUG_PIPELINE:-0}
      AUDIT_LOG: ${AUDIT_LOG:-1}
      DEBUG_DUMP_CONTEXT: ${DEBUG_DUMP_CONTEXT:-0}
      DEBUG_DUMP_PATH: ""
      # --- CAS OAuth2 (callback en la RAÍZ, sin /v2) ---
      CAS_BASE_URL: ${CAS_BASE_URL:-https://caspre.upv.es/cas}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-TUTOR-VIRTUAL}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:?OAUTH_CLIENT_SECRET is required}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-https://tutor-socratico.gnd.upv.es/api/auth/cas/callback}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-profile email}
      # --- Export de interacciones ---
      EXPORT_TOKEN: ${EXPORT_TOKEN:-}
      # --- Bypass de auth: SIEMPRE false en producción.
      #     Solo true (con NODE_ENV=development) para el smoke-test.
      #     El backend aborta si bypass=true + NODE_ENV=production. ---
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-false}
    volumes:
      - app_logs:/app/backend/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ⚠️ TEMPORAL: solo para probar por IP antes de cambiar el dominio.
    #    Prueba en http://158.42.148.30:8090/  — QUITAR estas 2 líneas
    #    (ports) antes del despliegue final con dominio.
    ports:
      - "8090:3001"
    expose:
      - 3001
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  pg_data:
  chroma_data:
  app_logs:

# Dokploy crea esta red automáticamente. Si usas "Isolated Deployments"
# en Dokploy, crea una red por despliegue y puedes quitar este bloque.
networks:
  dokploy-network:
    external: true
