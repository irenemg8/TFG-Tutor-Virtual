# ============================================================
#  nginx del contenedor frontend.
#  Recibe TODO bajo el prefijo /v2 (el proxy de delante —Traefik
#  de Dokploy o el nginx del servidor— debe reenviar /v2 SIN
#  quitar el prefijo) y:
#    - /v2/api/    -> contenedor backend  (la API)
#    - /v2/static/ -> contenedor backend  (ficheros servidos por el backend)
#    - /v2/        -> la SPA estática (React)
# ============================================================
server {
    listen 80;
    server_name _;

    # Subidas de ficheros (multer) y respuestas largas del LLM
    client_max_body_size 25m;

    # ---- API del backend ----
    location /v2/api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets (streaming del tutor con 'ws')
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # El LLM puede tardar; no cortes la conexión
        proxy_read_timeout  1800s;
        proxy_send_timeout  1800s;
        proxy_buffering     off;
    }

    # ---- Estáticos servidos por el backend ----
    location /v2/static/ {
        proxy_pass http://backend:3001/static/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA (React build con base /v2) ----
    location /v2/ {
        root      /usr/share/nginx/html;
        try_files $uri $uri/ /v2/index.html;
    }
}
